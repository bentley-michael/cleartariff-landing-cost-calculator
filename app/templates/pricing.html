<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClearTariff — Pricing</title>
  <style>
    :root {
      --bg: #f8fafc;
      --fg: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --card: #ffffff;
      --brand: #1e66ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.5 Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .price {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: var(--brand);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn[disabled] {
      background: #cbd5e1;
      color: #475569;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main>
    <h1>Simple pricing</h1>
    <p class="intro">Choose one report when you need a single landed cost PDF, or upgrade to unlimited when subscriptions open.</p>

    <section class="pricing-grid" aria-label="Pricing options">
      <article class="card">
        <h2>One Report</h2>
        <div class="price">$9</div>
        <p>Pay per duty & landed cost PDF</p>
        <button type="button" class="btn" onclick="buyReport()">Buy Now</button>
      </article>

      <article class="card">
        <h2>Unlimited</h2>
        <div class="price">$29/mo</div>
        <p>For power sellers and frequent importers</p>
        <button type="button" class="btn" disabled>Coming Soon</button>
      </article>
    </section>
  </main>

  <script>
    async function buyReport() {
      const res = await fetch('/api/checkout/create-session', { method: 'POST' });
      const data = await res.json();

      if (res.ok && data.checkout_url) {
        window.location.href = data.checkout_url;
        return;
      }

      alert(data.detail || 'Payment setup error');
    }
  </script>
</body>
</html>
